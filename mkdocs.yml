site_name: EGR 304 Vedaa Ubale Data Sheet
site_url: https://vedaau.github.io
repo_url: https://github.com/vedaau/vedaau.github.io
edit_uri: edit/main/docs/
theme:
  name: material
  custom_dir: custom_theme/
  palette:
    primary: blue
    accent: indigo
  font:
    text: Roboto
  logo: static/logo304.svg
  favicon: static/logo304.png

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - toc.follow    
    - navigation.top
    - navigation.path
    - navigation.indexes
    - navigation.prune
    - content.action.edit
    - navigation.footer
#    - navigation.sections
#    - navigation.expand
#    - navigation.instant # doesn't work that well

markdown_extensions:
  - attr_list #add attributes using curly brackets to images, see https://squidfunk.github.io/mkdocs-material/reference/images/
  - md_in_html # see https://squidfunk.github.io/mkdocs-material/reference/images/
  - footnotes
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tilde: {}
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

draft_docs: |
  **/*_unpublished.md
  **/*_draft.md
  **/*_draft**
  
plugins:
  - search
  - glightbox # allow re

nav:
  - Home: index.md
  - Block Diagram: 01-Block-Diagram/Block-Diagram.md
  - Component Selection: 02-Component-Selection/Component-Selection.md
  - BOM: 03-BOM/BOM.md
  - Schematic: 04-Schematic/schematic.md
  - Power Budget: 05-Power-Budget/Power-Budget.md
  - PCB Design: 06-PCB/PCB.md
  - Microcontroller Code: 07-Microcontroller-Code/Microcontroller-Code.md
  - Resources: 08-Resources/Resources.md
  - Hardware V2.0: 09-Hardware-V2.0/Hardware-V2.md
 
